services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: anyterm
      POSTGRES_PASSWORD: anyterm
      POSTGRES_DB: anyterm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
