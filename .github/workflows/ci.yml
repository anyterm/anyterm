name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Unit tests
        run: |
          pnpm --filter @anyterm/utils test
          pnpm --filter @anyterm/server test
          pnpm --filter anyterm test

  docker:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -f apps/server/Dockerfile -t anyterm-server .

      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t anyterm-web .

      - name: Verify server starts and responds
        run: |
          docker run -d --name server -p 3001:3001 \
            -e PORT=3001 \
            -e DATABASE_URL=postgresql://fake:fake@localhost/fake \
            -e REDIS_URL=redis://localhost:6379 \
            -e BETTER_AUTH_SECRET=test-secret \
            -e BETTER_AUTH_URL=http://localhost:3000 \
            anyterm-server
          sleep 3
          curl -sf http://localhost:3001/health
          docker rm -f server

      - name: Verify web starts and responds
        run: |
          docker run -d --name web -p 3000:3000 \
            -e PORT=3000 \
            -e SKIP_MIGRATIONS=1 \
            -e DATABASE_URL=postgresql://fake:fake@localhost/fake \
            -e REDIS_URL=redis://localhost:6379 \
            -e BETTER_AUTH_SECRET=test-secret \
            -e BETTER_AUTH_URL=http://localhost:3000 \
            anyterm-web
          sleep 5
          curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q "200\|308"
          docker rm -f web

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @anyterm/e2e exec playwright install --with-deps chromium

      - name: Build packages
        run: pnpm -r build

      - name: Run E2E tests
        run: pnpm test:e2e
